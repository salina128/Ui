<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Market Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    padding: 10px;
    background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 12px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 13px;
    margin: 6px 0;
    color: white;
    border: 1px solid rgba(255,255,255,0.15);
}

.row {
    display: flex;
    gap: 8px;
}

.row .btn {
    width: 50%;
}

/* 🎨 COLORS */
.green {
    background: linear-gradient(180deg, #43e97b, #38f9d7);
}

.red {
    background: linear-gradient(180deg, #ff416c, #ff4b2b);
}

.pink {
    background: linear-gradient(180deg, #ff6ec4, #7873f5);
}

/* CLICK EFFECT */
.btn:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<div class="card">
    🔥 <b>SHADOW MARKET v4.0 - OFFICIAL DASHBOARD</b> 🔥<br><br>
    Welcome back, <b>SHADOW</b><br><br>

    💎 YOUR ACCOUNT OVERVIEW:<br>
    💰 Available Balance: ₹0<br>
    🆔 Member Serial: 6515766014<br>
    👥 Market Size: 2 Members<br>
    ⚡ Account Status: VERIFIED ✅
</div>

<!-- 🔥 BUTTONS WITH COLORS -->

<button class="btn green" onclick="sendData('browse')">🛒 BROWSE CC CATALOGUE</button>

<div class="row">
    <button class="btn pink" onclick="sendData('profile')">👤 MY PROFILE</button>
    <button class="btn green" onclick="sendData('reward')">✨ DAILY REWARD</button>
</div>

<div class="row">
    <button class="btn red" onclick="sendData('txn')">📦 TXN HISTORY</button>
    <button class="btn pink" onclick="sendData('refer')">🎁 REFER & EARN</button>
</div>

<div class="row">
    <button class="btn green" onclick="sendData('redeem')">🎟 REDEEM COUPON</button>
    <button class="btn red" onclick="sendData('support')">📞 LIVE SUPPORT</button>
</div>

<!-- TELEGRAM WEB APP -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function sendData(action){
    tg.sendData(action);
}
</script>

</body>
</html>
