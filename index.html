<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Market Hub</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    font-family: Arial;
    color: white;
    padding: 10px;
}

/* CARD */
.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 10px;
}

/* BUTTON BASE */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    color: white;
    font-size: 13px;
    margin: 6px 0;
}

/* ROW */
.row {
    display: flex;
    gap: 6px;
}

.row .btn {
    width: 50%;
}

/* COLORS */
.green { background: linear-gradient(180deg,#00c853,#009624); }
.red { background: linear-gradient(180deg,#ff5252,#c62828); }
.pink { background: linear-gradient(180deg,#ff4da6,#c2185b); }
.blue { background: linear-gradient(180deg,#42a5f5,#1565c0); }
.purple { background: linear-gradient(180deg,#b388ff,#7b1fa2); }

/* HOVER */
.btn:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div class="card">
    🔥 <b>SHADOW MARKET v4.0 - OFFICIAL DASHBOARD</b> 🔥 <br><br>

    Welcome back, <b>SHADOW</b><br><br>

    💎 YOUR ACCOUNT OVERVIEW:<br>
    💰 Available Balance: ₹0<br>
    🆔 Member Serial: 6515766014<br>
    👥 Market Size: 2 Members<br>
    ⚡ Account Status: VERIFIED ✅
</div>

<!-- BUTTONS -->

<button class="btn green">🛒 BROWSE CC CATALOGUE</button>

<div class="row">
    <button class="btn red">👤 MY PROFILE</button>
    <button class="btn pink">✨ DAILY REWARD</button>
</div>

<div class="row">
    <button class="btn blue">📦 TXN HISTORY</button>
    <button class="btn purple">🎁 REFER & EARN</button>
</div>

<div class="row">
    <button class="btn pink">🎟 REDEEM COUPON</button>
    <button class="btn red">📞 LIVE SUPPORT</button>
</div>

</body>
</html>
