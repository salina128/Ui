<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Market Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    padding: 10px;

    /* 🔥 Telegram style background */
    background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 12px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* BUTTON BASE */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    font-size: 13px;
    margin: 6px 0;
    color: white;

    /* glass effect */
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
}

/* ROW */
.row {
    display: flex;
    gap: 8px;
}

.row .btn {
    width: 50%;
}

/* COLORS (Telegram style) */
.green {
    background: linear-gradient(180deg, #43e97b, #38f9d7);
}

.blue {
    background: linear-gradient(180deg, #4facfe, #00f2fe);
}

.red {
    background: linear-gradient(180deg, #ff6a6a, #ff3d3d);
}

.pink {
    background: linear-gradient(180deg, #ff4da6, #ff0080);
}

.purple {
    background: linear-gradient(180deg, #b388ff, #7b1fa2);
}

/* CLICK EFFECT */
.btn:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<!-- DASHBOARD CARD -->
<div class="card">
    🔥 <b>SHADOW MARKET v4.0 - OFFICIAL DASHBOARD</b> 🔥<br><br>

    Welcome back, <b>SHADOW</b><br><br>

    💎 YOUR ACCOUNT OVERVIEW:<br>
    💰 Available Balance: ₹0<br>
    🆔 Member Serial: 6515766014<br>
    👥 Market Size: 2 Members<br>
    ⚡ Account Status: VERIFIED ✅
</div>

<!-- BUTTONS -->

<button class="btn green">🛒 BROWSE CC CATALOGUE</button>

<div class="row">
    <button class="btn green">👤 MY PROFILE</button>
    <button class="btn green">✨ DAILY REWARD</button>
</div>

<div class="row">
    <button class="btn green">📦 TXN HISTORY</button>
    <button class="btn green">🎁 REFER & EARN</button>
</div>

<div class="row">
    <button class="btn green">🎟 REDEEM COUPON</button>
    <button class="btn green">📞 LIVE SUPPORT</button>
</div>

</body>
</html>
